version: "2"
run:
  go: "1.25"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - io.WriteString
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - ineffassign
          - staticcheck
          - unused
        path: _test\.go
      - linters:
          - errcheck
        path: cmd/odek/file_tool.go
      - linters:
          - errcheck
        path: cmd/odek/main.go
      - linters:
          - errcheck
        path: cmd/odek/mcp.go
      - linters:
          - errcheck
        path: cmd/odek/perf_tools.go
      - linters:
          - errcheck
        path: cmd/odek/repl.go
      - linters:
          - errcheck
        path: cmd/odek/repl_editor.go
      - linters:
          - errcheck
          - unused
        path: cmd/odek/serve.go
      - linters:
          - errcheck
        path: cmd/odek/telegram.go
      - linters:
          - errcheck
        path: cmd/odek/wsapprover.go
      - linters:
          - errcheck
        path: cmd/odek/subagent.go
      - linters:
          - errcheck
        path: cmd/odek/vision_tool.go
      - linters:
          - errcheck
        path: internal/memory/memory.go
      - linters:
          - errcheck
        path: internal/skills/cache.go
      - linters:
          - errcheck
        path: internal/skills/tools.go
      - linters:
          - errcheck
        path: internal/skills/types.go
      - linters:
          - errcheck
        path: internal/flock/flock.go
      - linters:
          - errcheck
        path: internal/telegram/approver.go
      - linters:
          - errcheck
        path: internal/telegram/health.go
      - linters:
          - staticcheck
          - unused
        path: internal/llm/client.go
      - linters:
          - staticcheck
        path: internal/loop/loop.go
      - linters:
          - errcheck
          - unused
        path: internal/mcpclient/client.go
      - linters:
          - staticcheck
        path: internal/memory/buffer.go
      - linters:
          - unused
        path: internal/memory/memory.go
      - linters:
          - ineffassign
        path: internal/memory/merge.go
      - linters:
          - staticcheck
        path: internal/telegram/bot.go
      - linters:
          - errcheck
        path: internal/schedule/store.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
